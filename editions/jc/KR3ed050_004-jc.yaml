body:
  text: 卷之四瘧治諸瘧對症用藥歌夏傷於暑秋髮瘧邪風正氣相交作又因飲食不調勻生冷停痰寒熱搏先寒後熱寒瘧侵先熱後寒溫瘧作更有單熱而不寒此症名之為癉瘧一日一發容易治兩日三日難捉摸治法消暑與除痰先服柴苓湯的確次用截瘧鬼哭丹清脾飲是尋常藥柴苓湯治先寒後熱分陰陽利小便諸瘧通用此方為首小柴胡湯臺五苓散柴胡半夏人參黃苓甘草以上小柴胡湯豬苓澤瀉茯苓肉桂白朮以上五苓散上用水盞半姜五片棗一枚煎至七分熱服鬼哭丹截諸瘧如神人參二錢雄黃一錢綠豆粉一錢上為末以端午日粽尖七枚搗為丸如綠豆大每服二丸或三丸臨發之日用空心面東冷水吞服清脾飲治諸瘧不問寒熱後先通用青皮厚朴白朮半夏柴胡茯苓草果仁上用水盞半姜五片煎七分溫服不拘時痢治諸痢對症用藥歌借問何故而成痢蓋因物積並氣滯物欲出時氣不行脾胃不知飲食致夏月過食生冷多及至秋來有如是單白單紅兼赤白醫者只將三則治單紅主熱單白冷冷熱不和兼赤白紅痢解毒並香薷枳殼稜莪三用得參苓白朮加木香久痢不止還堪啜我有神仙換骨丹一服當先功莫測黃連解毒湯治紅痢黃連黃柏黃芩梔子半夏厚朴上用水二盞加生薑三片煎至一盞熱服胃苓湯平胃散合五苓散治久痢蒼朮陳皮厚朴甘草平胃散豬苓澤瀉茯苓肉桂白朮以上五苓散上用水二盞姜三片棗二枚煎七分熱服真人養臟湯治大人小兒冷熱不調下痢赤白或如膿血裡急後重臍腹痛脫肛墜下止酒毒便血人參當歸肉桂木香白朮粟殼蜜炙肉豆蔻柯子白芍藥上用白水煎服臟寒加附子敗毒散治下痢熱毒衝心不進飲食人參桔梗甘草川芎茯苓枳殼前胡羌活獨活柴胡上醫方大成加石蓮子肉用生薑三片薄荷少許同煎去滓不拘時候胃風湯治赤白痢泄瀉虛弱腹痛人參白朮茯苓官桂川芎芍藥當歸上用粟米百粒煎服地榆散治血痢冷疼泄瀉皆可服地榆粟殼茯苓甘草芍藥當歸乾葛乾薑上用白水煎服參苓白朮散治久痢脾胃虛弱不進飲食嘔吐泄瀉開胃助脾等症人參茯苓白朮扁豆山藥蓮肉砂仁桔梗甘草米仁上用白水煎服若噤口痢多加石蓮肉通為細末老米湯調下神仙換骨丹治臟腑一切積滯及驚熱大便不通大戟葶藶甘遂芫花豆豉杏仁三梭莪朮大黃石榴皮巴豆去殼五靈脂烏梅肉上各等分為末用好米醋調勻濕透炒焦醋攪麵糊為丸圓如綠豆大每服九丸或十三四丸量人之大小空心冷茶吞下凡諸痢症水腫心氣疝氣及肚內一切積滯並皆神效咳嗽諸咳嗽對症用藥歌肺為華蓋居上膈只件清虛嫌滯塞七情四氣有一觸因而咳喘一齊發肺氣風寒痰咳清其聲清利無他說肺實風熱痰白稠其聲乾燥多咽噎蘇沉九寶治風寒人參敗毒除風熱四季參蘇飲可兼秋天金沸草奇絕肺痿咯血甘桔湯加上黃連真秘訣蘇沉九寶湯治老人小兒素有喘急遇寒暄不常發則連綿不已咳嗽哮吼夜不得睡紫蘇麻黃杏仁甘草官桂薄荷陳皮大腹皮桑白皮上水盞半姜二片烏梅二個煎溫服敗毒散治傷風咳嗽頭疼人參桔梗甘草川芎茯苓枳殼前胡羌活獨活柴胡半夏上水盞半生薑三片煎七分服參蘇飲治上焦有熱咳嗽聲重人參紫蘇陳皮桔梗前胡半夏乾葛茯苓甘草木香枳殼上水盞半姜七片棗一枚煎熱服金佛草散治肺經受風頭目昏痛咳嗽聲重涕唾稠黏時行寒疫壯熱惡風甘草麻黃前胡半夏金沸草赤芍藥荊芥上用水一盞姜三片棗一枚溫服甘桔湯治風痰上壅咽喉腫痛桔梗甘草各不拘多少上用水盞半煎八分通口服咳血加黃連咳者氣動也陽也嗽者兼陰血也霍亂治霍亂對症用藥歌夏秋之間天氣暄熱腠理正疏風邪易入暑濕時侵多生此症然有陰陽虛實不同察脈之浮而洪氣盛而調者為可治微而遲氣少不調者為難治也霍亂吐瀉為何因上吐下瀉腳轉筋只緣胃氣承虛弱飲食不調元是根日間受熱夜感冷邪氣正氣尤不分所以發而為吐瀉治療隨時要酌斟藿香正氣春冬用五積嚴寒可救人夏月藿苓為要領六和秋月有神靈霍香正氣散治霍亂吐瀉腹疼春冬宜服藿香白芷茯苓紫蘇大腹皮厚朴陳皮甘草桔梗半夏上水一盞姜三片棗一枚煎至七分熱服合五苓散名藿苓湯治霍亂吐瀉小便赤少心神恍惚一法再加木瓜合香薷飲名藿薷湯治霍亂髮熱加麥門冬竹葉五積散治渾身麻木兼治損疼白芷陳皮厚朴甘草桔梗枳殼川芎芍藥茯苓蒼朮當歸半夏肉桂乾薑麻黃上水盞半姜三片蔥白三莖煎七分熱服六和湯治霍亂吐瀉兩腳轉筋四肢厥冷半夏砂仁杏仁人參甘草扁豆木瓜藿香香薷厚朴赤茯苓上水二盞姜三片棗一枚煎至七分溫服不拘時候水腫諸水腫對症用藥歌水腫之病出乎脾時醫不識亂猜疑腎水脾上兩要固脾上一虧水無圍氾濫迸流四肢去使人浮腫黃光輝風腫氣腫並血腫陽水陰水也須知風腫走注皮麻木氣腫隨氣消長之血腫之病如何識皮間赤縷血痕兒陽水身熱陰水冷利水和脾總治之木香流氣除三腫甚者當先用利宜陽水身熱八正散陰水身涼胃苓奇水腫通用牛黃散香平散子世間稀木香流氣飲治陰水不煩大小便利木香厚朴青皮甘草蘇葉陳皮肉桂檳榔草果丁皮藿葉木通人參白朮木瓜菖蒲白芷半夏薑製麥門冬香附子蓬莪朮大腹皮赤茯苓上用水二盞姜三片棗一枚煎七分熱服八正散利小便去浮腫瞿麥萹蓄滑石大黃梔子木通車前子甘草上用水盞半燈心一結煎七分食前服胃苓散平胃散合五苓散治水腫蒼朮陳皮厚朴甘草以上平胃豬苓澤瀉茯苓肉桂白朮以上五苓上用水二盞姜三片棗二枚煎七分熱服牛黃散黑牽牛大黃三兩陳米飯鍋焦一兩上為末曲糊丸如梧桐子大常服四五十丸淡薑湯送下欲通利加至百丸香平散治水氣血三腫香附子黑牽牛京三稜篷莪朮乾薑上為末各等分共二斤入平胃散末一斤合和每服二錢半白湯醋湯薑湯皆可調服用老米醋為丸亦好宿食內消宿食對症用藥歌宿食緣何不克消只因體弱胃脾嬌最怕過餐生冷物遂成積滯不僥調嘔惡吞酸兼噫噎滿胸氣膈熱隨潮頭疼泄痢多般疾虛實隨人用藥高輕者三稜紅丸子重則麻黃等味調虛寒脾積並感順突熱神芎治上焦投劑但能依此訣何須過慮把心操三稜丸順氣寬中消積滯除膨脹等症三稜半斤細銼為末水三升煮成膏杏仁去心炒青皮蘿蔔子炒乾漆炒神麯上為末並三稜膏為丸如梧桐子大每服三十丸米湯送下紅丸子消食化氣兼治食壅取積下熱服之神效雄黃研川鬱金各一分巴豆十四粒去油上為末醋煮麵糊為丸如麻子大每服五丸加至七丸熱茶送下喉閉用熱茶清調灌脾積丸治臟腑一切寒食積丁香生木香巴豆肉良薑醋煮各五錢莪朮二兩三稜一兩青皮一兩皂角三大個燒存性上為末入百草霜三匙麵糊丸如麻子大每服十丸加至二十丸隨症下脾積氣陳皮湯下口吐酸水淡薑湯下嘔吐藿香甘草湯下小腸疝氣茴香酒下婦人血氣刺痛淡醋湯下小兒疳氣使君子湯下感應丸治停積宿食不能克化有傷脾胃百草霜一兩杏仁去皮尖肥者二百四十個丁香兩半木香兩半肉豆蔻去皮二十個川乾薑炮三兩巴豆七十個去皮心膜搗出油研如粉上除巴豆百草霜杏仁外餘四味為末與前藥三味同拌研細先將黃蠟六兩溶化以重錦濾過入好酒一升於器內煮蠟溶滾數沸傾出候酒冷其蠟自浮於上取蠟稱用春夏用油一兩秋冬用油兩半熬令香熟次下蠟四兩同化作汁就鍋內乘熱拌和前藥成綻油紙包收旋丸每服三十丸姜渴送下神芎丸治上焦積熱風痰壅滯頭目赤腫或有瘡癤咽膈不利大小便秘澀一切風熱酒磨服亦可諸滯尤宜服大黃黃芩各三兩牽牛滑石各四兩黃連川芎薄荷葉上為末滴水丸如梧桐子大每服五十丸溫水送下黑丸子治中脘有宿食不消吞酸噁心口吐清水或心腹飧泄百草霜三分杏仁去皮尖三七個巴豆去殼十個半夏九個砂仁三七粒上為末痢疾加烏梅三個麵糊丸如黍米大每服二十丸或三十丸薑湯下木香分氣丸寬中順氣消導積滯甘草炙六兩木香不見火甘松各一兩香附子一斤莪朮八兩上為末水糊丸如梧桐子大每服三十丸生薑陳皮煎湯送下女科婦人胎產諸病對症用藥歌女科雖曰有專攻余病皆於男子同獨有胎前併產後血崩經候滯難通烏沉和氣常當服更得逍遙散有功四物湯中加減用懷胎涼燥莫相逢孕婦忌用南星半夏乾薑肉桂滑石硝黃大寒大熱燥性之藥烏沉湯治產後諸疾尋常亦可服烏藥陳皮川芎甘草當歸香附子芍藥上用白水煎午前服和氣飲治胎前產後諸疾尋常亦宜紫蘇川芎陳皮甘草厚朴白茯苓荊芥上用白水煎服發熱加黃芩逍遙散治發熱經候不調勞熱咳嗽當歸芍藥赤茯苓白朮甘草柴胡薄荷上用白水煎服不拘時候四物湯治虛損月水不調常服調益榮衛滋養血氣當歸川芎白芍藥熟地上用水二盞慢火煎至七分空心熱服妊娠胎前產後血塊不散或亡血過多或惡露不下並宜並具隨症施治加減於下妊娠下血宜加艾葉六七片阿膠末一錢如疾勢甚大散藥不及以四味各五錢用水四盞煎至二盞分為四劑食前熱服一日令盡以醒為度如產後血虛臟腑不調因虛致熱熱與血搏口舌乾燥頻欲飲水加天花粉一兩麥門冬三錢腹中刺痛惡物不下者加當歸芍藥各一錢血崩不止者加川芎一分柴胡五分身熱脈醜頭暈項強者加柴胡黃芩各五錢大便秘結不通者加大黃五錢桃仁二分炒大便滑泄者加桂心熟附子各一分發寒熱加牡丹皮乾薑芍藥各一分嘔吐者加白木人參各五分腹脹者加厚朴枳實各一分虛煩不眠宜加竹葉人參各一分虛躁大渴者加知母石膏各五錢水停心下感熱逆加豬苓防己茯苓各一分虛寒伏熱者加人參柴胡各三分防風四分經候過而作痛氣虛也本方對四君子湯服之名八珍湯經候將來作痛者氣血實也加桃仁黃連香附子經候不及期者血熱也加黃連經候過期血少也加人參白朮色帶淡加半夏陳皮過期紫黑有男者血熱也必作痛不可忍宜加香附子黃連過期而色淡者體弱血衰也加芎歸二味併合二陳湯紫色成塊血熱也加黃連柴胡肥人不及日數且多痰多血有熱加香附子南星半夏黃連白木瘦人血枯經閉者加桃仁紅花或越鞠湯上丹溪加減四物湯氣充經脈如故月事頻並臍下時作痛加芍藥經欲行臍腹絞痛加玄胡索檳榔苦楝木香經水過多者加黃芩白朮經水澀少者加葵花紅花經水適來適斷或往來寒熱宜先服小柴胡湯去寒熱後仍以四物湯和之上元戎加味四物湯經候不通臍脅或痛本方對調胃承氣湯是名玉燭散經候不調臍腹疼痛只用芎歸二味名為君臣散婦室經事不行腹中結塊疼痛者加桂心蓬朮各等分名之為六合湯婦人赤白帶下脈沉微腹痛或陰中作痛用本方四兩加肉掛附子五錢煎服名為元戎六合湯二陳湯半夏陳皮甘草白茯苓上㕮咀用生薑烏梅煎服越鞠丸治血鬱桃仁紅花撫芎香附子青黛上各等分為末稀糊為丸如梧桐子大每服四五十丸食前服寶鑑曰宋褚澄療師尼寡婦別制醫方蓋有為也此二種寡居獨陰無陽欲心萌而不遂是以陰陽交爭乍寒乍熱全類溫瘧久則為癆史記倉公傳載濟北王侍人韓女病腰背痛寒熱眾醫皆以為寒熱倉公曰病得之欲男子不可得也診視其肝脈弦出寸口是以知之蓋男子以精為主婦人以血為主男子精盛以思有女人血盛以懷胎也如厥陰脈弦出寸口又上魚際則血盛可知故知褚氏之言匪虛也幼科小兒諸病對症用藥歌幼小醫家另設科一時要用不知何驚風發熱兼痰嗽保命丹投不必多未出痘花神異治驚逢急慢紫金磨腹疼吐瀉宜助胃唇口生瘡化毒和發熱變蒸惺惺散風痰潮熱抱龍扶諸疳蘆薈皆通用嘔吐燒針丸對科痢疾木香清膈飲臍風匝口蠍梢扶散名保命攻鵝口即雪口夜啼豬乳四君和診視嬰孩脈理歌三五嬰孩脈未全只憑虎口指頭間原分左右觀男女寅卯關邊仔細探脈現寅關紋細短輕災易治不為難寅關脈起連通卯病勢根深莫小看若透三關辰位上總逢慮扁也難痊食指下節為寅中節為卯上節為辰育嬰歌養子須調護看承莫縱馳乳多終損胃食壅即傷脾衾厚非為益衣單正所宜無風頻見日寒暑順天時又云若要小兒安常帶三分肌與寒保命丹治小兒一切驚風發熱痰嗽天麻一錢防風粉草姜蠶炒去絲白附子硃砂鬱金各一錢麝香少許全竭一錢去尾尖薄荷青黛南星半夏用生薑汁浸三日銼碎各二錢上為末煉蜜丸如皂角子大每服一丸燈心金銀湯送下紫金錠治小兒驚風大有神效人參茯苓茯神辰砂山藥乳香赤石脂醋火爁七次白朮各三錢金箔十五片另研為衣上為末以糕一兩為丸薄荷湯磨服神異丹治未出痘疹小兒一切驚風發熱痰嗽等症全蠍去尾尖天麻薄荷防風乾葛姜蠶炒去絲半夏薑汁製南星薑汁製荊芥穗川升麻芍苑甘草川芎上各等分為末煉蜜丸如皂角子大每服一丸白滾湯送下助胃丹洽小兒吐瀉腹痛豬苓澤瀉茯苓肉桂白朮各三錢以上即五苓散蒼朮陳皮厚朴甘草各四錢以上即平胃散再加肉豆蔻三錢紙裹煨熟上為末煉蜜丸如芡實大米湯化下五福化毒丹治小兒唇口腫破生瘡玄參焙桔梗茯苓各二兩人參半兩青黛牙硝枯研各一兩甘草焙七錢麝香錢半金銀箔各四十片為衣上為末煉蜜丸如皂角子大用薄荷湯化下口臭以生地黃汁調下抱龍丸治小兒痰嗽驚風時作寒熱牛膽南星一兩天竺黃五錢雄黃辰砂各二錢半麝香一錢另研上為末煉蜜丸如欠實大薄荷湯化下惺惺散治變蒸發熱咳嗽痰涎鼻塞聲重人參白朮甘草桔梗白茯苓天花粉白芍藥細辛根上用水一盅煎四分溫服蘆薈丸治小兒脾胃積熱漸成疳疾宜服之黃佳去須龍膽草蕪荑去皮先炒黃色再與上二味同炒蘆薈一錢另研上為末飯飲丸如黍米大隨大小加減空心米湯下大蘆薈丸治小兒諸疳積神效蘆薈蕪荑木香青黛川黃連檳榔各等分蟬退七個麝香少許胡黃連上為末以雄豬膽汁浸糕作糊丸如麻子大每服二三十丸米飲送下燒針丸治小兒胸膈吐逆下注瀉不止者黃丹硃砂枯礬上為末以棗肉丸如大豆樣每三四丸戳針尖上就清油燈焰上燒過研爛涼米泔水調下瀉者食前服吐者不拘時又名硃砂丸木香清膈飲治小兒赤白痢木香人參甘草厚朴陳皮茯苓杏仁雞蘇宿砂麥門冬上㕮咀加姜二片棗一枚煎服啟脾散小兒百病愈後宜服此以養脾凡初生小兒用塗乳頭上服之連肉一兩白朮茯苓山藥神麯山查各五錢人參豬苓澤瀉藿香木香當歸白芍藥砂仁各三錢肉豆蔻三個陳皮二錢甘草一錢上為末任意多寡薑湯調服驚風后加辰砂滑石各二錢保命散治小兒雪口白屑滿口如鵝之口者心脾熱也用發纏指頭蘸薄荷自然汁或臘雪水拭淨如不脫即用此方枯礬硃砂各五分馬牙硝二鎮五分上為末每一宇取白鵝糞擂水調塗舌上及頷頰內立效蠍梢散治一切胎風及百日內匝口臍風全蠍梢四十九十每小用生薄荷葉卷定以綿扎之砂鍋內滾炒薄荷干酥為度姜蠶四十九個片腦麝香各少許上為末用火雄雞肝二片煎湯調服即止又法於七日內患此者急看兒齒齦之上有小泡如粟米狀急以軟青布裹手指蘸溫水經輕擦破即開口安妥不必用藥豬乳膏治小兒上半夜驚啼制肝乃胎中受驚所致急宜用此琥珀防風各一錢硃砂五分上為末用豬乳汁調一字抹兒口中極驗四君子湯治小兒下半夜驚啼不止及腰曲內釣手足抽制皆虛寒所致也人參白朮茯苓甘草山藥扁豆上為末每挑少許於乳頭上令兒吮之如血熱焦啼用當歸為末乳汁調一字抹乳與吮亦效凡小兒生下不能啼者必困難產冒寒所致急以綿絮裹抱杯中未可遽斷臍中且將胞衣置灰火中煨之仍作大油紙捻點燈於帶上往來遍燎使火氣由帶而入臍內更以熱醋湯澆洗臍帶須臾氣回啼哭如常方可浴洗然後割斷臍帶則易養無虞也又初生小兒穀道無孔者乃肺熱閉於肛門急用金銀玉簪看其端的刺穿或用火對亦可然刺不可深仍以油紙捻條套住如蜜導法內服四順清涼飲免其再合急救良方救夢中魘死歌夢中魔死如何救原若無燈勿點燈亟以竹筒吹耳竅鹽湯灌鼻效如神或吹鼻內通關散或滴其中韭汁靈兼治卒然來中惡即時起死便回生救冷舍鬼迷歌官房冷舍久無人偶睡其中被鬼侵口不能言聲吃吃若天良藥便沉沉牛黃末與雄黃末再入硃砂各五分一半火燒床榻下酒調一半灌之靈治瘀血衝心垂絕歌瘀血衝心墜下時淹淹欲絕氣難支豆豉急取濃煎服續命靈丹怎得知或遇咬牙無氣息急遺小便灌之宜人能記得仙方去到處施仁寨國醫救絞腸沙急痛歌絞腸沙痛是何如手足如冰陰症虛定有遍身紅點發燈心燃火燎之除若然手足仍溫暖此是陽沙另法法十指甲邊針刺遍捋將兩臂血漣洳解砒霜毒歌若人要解砒霜毒稻杆燒灰淋水服麻油人糞效俱靈雞羊鴨血功並靈毒中飯肉皆可醫若中酒杯命難續瓜蒂稀涎散合投吐得出時才是福解巴豆毒歌人若中傷巴豆毒忽然大瀉噁心頻熱煩焦渴時兼嘔黃蘖黃連兩味平等分滾煎傾候冷服時勿使熱湯親再將手足寒泉浸切忌諸般熱物臨解百草毒歌預防百草毒傷人四兩藍根不可少再需三味各兩方青黛管仲生甘草四般為末作餅蒸蒸熟為丸赤豆小外邊仍用靛為衣水下甘丸諸毒好解諸般菌毒歌諸般菌毒每傷人甚或令人笑不禁必是蟲蛇蟠踞處薰蒸毒氣結成根急將淨地開深坎直見黃泥把水傾攪溷少澄吞一碗應知到口便安寧不然更得芫花末水下錢方效益靈解金蠶盎毒歌金蠶盅毒中人腸試把生礬黑豆嘗豆不生腥礬不澀必然犯此不須詳石榴根上皮煎汁飲下之時嘔吐良吐出活蟲無不愈若然不吐中膏肓解魚骨鯁喉歌喉中骨鯁有方傳甘草砂仁等分研為末裹綿舍咽久骨隨痰出便安然或將金鳳根和子咀嚼噙之骨似綿稍愈急將湯漱口慮其傷犯齒牙間又或南朋砂一味水噙化鯁效如仙救獸骨鯁喉歌諸般獸骨鯁喉中桑樹蟲窠蛀屑攻米醋稀調隨口咽總然凶猛片時通或將狗唾時時咽救急權宜亦可以獨有象牙磨水服登時見效勝他功
