body:
  text: 卷之二用藥發明藥本五味歌酸為木化氣本溫能收能澀利肝經苦為火化氣終熱能燥能堅心臟丁甘始土生氣化溫能開緩摻從脾行辛自金生氣帶燥能開潤瀉通肺竅咸從水化氣生寒下走軟堅足腎道淡味方為五行本運用須知造化要引經報使藥歌小腸膀胱屬太陽藁本羌活是本鄉三焦膽與肝胞絡少陽厥陰柴胡強大腸陽明並足胃葛根白芷升麻當太陰肺脈中焦起白芷升麻蔥白鄉脾經少與肺部異升麻兼之白芍詳少陰心經獨活主腎經獨活加桂良通經用此藥為使豈能有病到膏肓六陳歌枳殼陳皮半夏齊麻黃狼毒及茱萸六般之藥直陳久入藥方知奏效奇十八反歌本草明言十八反逐一從頭說與聽人參沙參與芍藥玄參紫參及細辛苦參丹參共八味一見黎蘆便殺人白及白斂並半夏瓜蔞貝母五般真莫見烏頭與烏喙逢之一反疾如神大戟芫花兼海藻卻與甘遂四般並若遇甘草同煎服縱有良醫活不成外有六般相反物切須避忌認之真蜜蠟莫與蔥相見藜蘆勿使酒來侵石決明休見雲母犯了之時禍不輕又捷徑歌本草明言十八反半蔞貝斂及攻烏藻戟遂芫俱戰草諸參辛芍叛藜蘆十九畏歌硫黃原是火之精朴硝一見便相爭水銀莫與砒霜見狼毒最怕密陀僧巴豆性烈最為上偏與牽牛不順情丁香莫與鬱金見牙硝難合荊三稜川烏草烏不順犀人參最怕五靈脂官桂善能調冷氣若逢石脂便相欺大凡修合看順逆炮爁炙煿莫相依妊娠服藥禁歌蚖斑水蛭及虹蟲烏頭附子配天雄野葛水銀並巴豆牛膝薏苡與蜈蚣三稜芫花代赭麝大戟蟬蛻黃雌雄牙硝芒硝牡丹桂槐花牽牛皂角同半夏南星與通草瞿麥乾薑桃仁通硇砂乾漆蟹爪甲地膽茅根都失中炮製藥歌芫花本利水非醋不能通緑豆本解毒帶殼不見功草果消膨效連殼反脹胸黑醜生利水遠志苗毒逢蒲黃生通血熟補血運通地榆醫血藥連梢不住紅陳皮專理氣留白補胃中附子救陰藥生用走皮風草烏解風痹生用使人蒙人言燒過用諸石火紅入醋能為末制度必須工川芎炒去油生用氣痹痛炮爁常依法方能奪化工吳文正公序醫方大成曰以一藥治一病者本草也以數藥治一症者醫方也醫方祖於本草而其合數藥為一方也大抵處方要在合宜而用不可務取品味數多過制越此反為不效矣藥象主治五臟法春肝苦急甘以緩之甘草散以辛者川芎補以辛者細辛瀉以酸者白芍藥夏心苦緩酸以收之五味子心欲耎以咸者芒硝補以咸者澤瀉甘者人參甘草黃耆土脾苦溫苦以燥之白朮脾欲緩者甘草補者人參瀉者黃連秋肺苦氣上逆苦以瀉之黃芩肺欲酸以收者白芍藥補以酸者五味子瀉以辛者桑白皮冬腎苦燥辛以潤之黃柏知母腎欲堅以苦者知母補以苦者黃柏瀉以咸者澤瀉用藥身梢論凡藥根在土中者中半已上氣脈上行以生苗者為根中半已下氣脈下行以入土者為梢病在中焦者用身上焦用根下焦用梢經云根升梢降也大凡用藥以頭身梢分為上中下病在人身半已上者天之陽也用頭在中焦者用身在人身半已下者地之陰也用梢述類象形者也用藥丸散論仲景曰銼如麻豆大與㕮咀同意夫㕮咀者古之制也古無鐵刃以口咬細令如麻豆為粗藥煎之使藥水清飲於腹中則易升易散也此所謂㕮咀也今人以刃器銼如麻豆大此㕮咀之易成也若一概為細末不分清濁矣經云清陽發腠理濁陰走五臟果何謂也又曰清陽實四肢濁陰歸六腑是也㕮咀之法取汁情易循行經絡故也若治至高之病加酒煎去濕加生薑煎補元氣以大棗煎發散風寒以蔥白煎去膈上病以蜜煎散者細末也不循經絡止去膈上病及臟腑之病氣味厚者煎服去滓但服百丸者去下部之疾其丸極大而光且圓治中焦者次之治上焦者則極小稠糊面丸者取其遲化直至下焦或酒或醋丸者取其收散之意也用半夏南星或去濕者以生薑汁煮糊為丸制其毒也稀糊丸者取其易化也水浸一宿炊餅為丸及滴水為丸者皆取易化也煉蜜為丸者取其遲化而氣循經絡也用蠟為九者取其難化而旋施功也大抵湯者蕩也去久病者用之散者散也去急病者用之丸者緩也不能速去其病用藥舒緩而治之也類集古方歌訣麻黃湯中用桂枝杏仁甘草四般兒發熱惡寒身體痛須知一服汗淋漓桂枝湯內藥三般芍藥甘草一處攢若把二方相合用方名各半治傷寒十神湯內紫蘇多甘草陳皮香附科乾葛升麻並芍藥川芎白芷麻黃和香蘇散內紫蘇最香附陳皮甘草革本方只此四味全加上麻黃芎芷桂大青龍湯桂麻黃甘草杏仁石膏藏棗子生薑煎熱服惡寒無汗又為良升麻葛根湯四味攢上芍藥甘草是傷寒發熱與頭疼汗出惡寒風熱治人參敗毒散桔梗甘草川芎茯苓等枳殼前胡羌獨活柴胡十味性涼冷小柴胡湯只五般半夏人參一處攢更有黃芩與甘草生薑棗子水同煎大柴胡湯用大黃半夏枳殼此為良更有黃芩赤芍藥薑棗煎來利大腸五苓散內用豬苓白朮茯苓澤瀉停肉桂用之多與少白水煎來止渴行四逆湯中姜一兩生附減半去皮尖二兩甘草水煎服厥而下利用之痊理中甘草用於姜白朮人參是泛常若是內中加附子更名附子理中湯小建中湯芍藥三生薑附子一分參更得桂枝加兩半膠飴大棗治傷寒瓜蒂散中赤小豆二味勻平有傳授豆豉一合水同煎吐去膈痰須此救小承氣湯三件藥枳實大黃並厚朴結胸譫語大使堅每貼五錢煎沸服大承氣湯用朴硝大黃等分不須饒厚朴倍加並枳殼通腸利便有功勞桃仁承氣五般奇甘草硝黃並桂枝血症發黃並血竭熱泄亂語總相宜黃連解毒湯四味黃柏黃芩梔子是退黃敗毒又除煩熱血便紅皆可治白虎湯中用石膏甘草知母本方抄人參亦有加之用熱渴虛煩用米熬竹葉石膏湯用參門冬半夏更加臨甘草生薑兼用米虛煩自利熱家尋真武湯中芍藥魁茯苓白朮甘草隨附子炮來加減用生薑五片總相宜茵陳蒿湯只一味濃煎退疸去身黃梔子柏皮兼可用五苓加上又為良防風通聖將軍芍薄荷歸芎草朴硝白朮梔翹芩桔梗麻黃荊芥滑石膏上加菊花藿香砂仁減麻黃朴硝名仙術芎散加益元散名雙解散烏藥順氣陳皮姜枳殼姜蠶芎芷詳甘草麻黃兼桔梗中風先服最為良小續命湯防己桂杏仁黃芩芍藥配參芎甘草與麻黃防風附子一處會排風白朮桂苓芎杏芍甘麻與防風獨活當歸白蘇佐稀涎治搐有良功星香散內炮南星更有木香生用靈若是加添為附子方名改換作三生五積白芷陳皮朴桔梗枳殼川芎芍甘草茯苓蒼朮歸半夏桂姜麻黃著香薷散內藥三般厚朴還將扁豆參更入黃連為妙絶和中祛暑最相安六和半夏縮砂仁杏仁參草扁豆停木瓜赤茯藿香葉香茹厚朴治瀉頻滲濕湯中白朮先丁香蒼朮茯苓兼甘草陳皮皆等分乾薑加上濕皆痊除濕湯中用霍香陳皮厚朴術名蒼白朮茯苓並半夏入些甘草在中央清脾湯里有柴胡半夏黃芩草果咀白朮茯苓加厚朴青皮甘草棗姜扶平胃散中四般藥蒼朮陳皮並厚朴更加甘草和脾胃薑棗煎來調治瘧真人養臟粟殼參訶子當歸肉蔻真白朮木香並芍藥乾薑肉桂不須尋參蘇飲內有陳皮桔梗前胡半夏宜乾葛茯苓甘草聚木香枳殼總堪題蘇沉九寶薄荷陳桑桂麻黃蘇杏仁大腹皮同甘草入諸般咳嗽效如神金沸草湯用麻黃甘草芍藥荊芥良更有前胡並半夏七般煎服用生薑桔梗湯中用防杞百合貝母瓜蔞子甘節參歸杏苡仁桑白黃耆桔梗使藿香正氣用紫蘇大腹陳皮桔梗咀甘草茯苓半夏曲厚朴白芷棗姜扶八正車前與瞿麥萹蓄滑石山梔仁大黃木通入甘草熱淋逢之效若神木香流氣藿香蓬參朮甘果檳瓜通夏朴青丁陳蘇腹茯蒲桂芷麥香冬十全大補有人參肉桂川芎地黃蒸芍藥茯苓並白朮黃連甘草當歸停黃耆建中湯肉桂甘草芍藥同此類諸虛不足通用之大生血氣養榮衛分心氣飲木通桂赤芍茯苓半夏配甘草大腹青陳皮桑白羌活紫蘇對手拈散用延胡索沒藥甘草五靈脂每服三錢溫酒下心脾氣痛總能醫雞舌香散有良薑赤芍肉桂香附良天台烏藥同甘草入鹽些小點煎湯川芎茶調散薄荷白芷防風甘草和更有細辛羌活等荊芥同煎用者多如聖散中香白芷川芎防風細辛使雄黃草烏兩頭尖熱酒調之忌油膩消風散用荊芥參甘草陳皮白茯苓姜蠶芎與防風藿蟬退厚朴羌活停獨活寄生桑寄生杜仲牛膝細辛參秦艽地黃桂芍草防風當歸芎茯苓對金飲子先厚朴蒼朮甘草陳皮著加上草果又為良薑棗煎來調治瘧七氣湯中半夏多桂心厚朴紫蘇銼芍藥茯苓陳皮入人參八味棗姜和洗肝散內薄荷葉當歸羌活山梔仁大黃防風甘草等川芎治眼效如神人參款花膏紫苑桑白五味子同選煉蜜丸如芡實大食後薑湯漫漫咽消風百解荊芥芷陳皮麻黃蒼朮比甘草攢煎蔥與姜頭疼發熱咳嗽使款冬花散知母先桑白麻黃阿膠黏杏仁貝母並半夏甘草㕮咀入姜煎補中益氣黃耆參甘草白朮當歸身柴胡升麻陳皮當形勞虛損喘皆靈升陽散火用升麻甘草人參芍藥加更得柴胡羌獨活防風共入總堪誇五膈寬中厚朴尋青陳皮與木香臨再將香附砂仁聚白蔻丁香八味靈喉痹拔萃桔梗湯甘草連翹薄荷涼梔子黃芩通六味更加竹葉又為良當歸和血散槐花青皮荊芥穗升麻川芎白朮地黃熟腸癖溫毒用之佳參苓白朮薏苡仁甘草蓮肉山藥停桔梗扁豆砂仁用棗姜虛熱瀉皆寧四物龍膽湯地黃川芎芍藥當歸良防風防己草龍膽眼疼食後水煎嘗局方四七湯理氣茯苓半夏厚朴多紫蘇葉與生薑煮喘急兼將中脘和發明半夏溫肺湯細辛桂心旋覆花甘草陳皮參桔梗芍藥茯苓赤者良蘇子降氣湯半夏甘草前胡肉桂咀當歸厚朴陳皮等薑棗同煎痰喘舒獨活散內川芎尋羌活荊防薄荷成生地黃兼細辛使煎來漱咽治牙齦皂角升麻湯白芷防風川芎白附子甘草羌活與黃芩風熱牙疼皆可使洗心散用麻大黃白朮當歸芍藥涼荊芥穗同甘草等薄荷加上水煎湯涼隔連翹梔子仁大黃甘草朴硝芩竹葉薄荷加蜜煮諸般積熱效如神清心蓮子飲黃芩甘草車前白茯苓麥門地骨參耆使下虛上盛治諸淋茯苓補心前胡參紫蘇半夏當歸身甘草陳皮川芎芍地黃熟用棗姜親延胡索散蓬莪朮當歸酒浸共三稜月水不調紅花使更兼童便酒煎行八珍湯最順陰陽滋榮養血此為良四物湯同四君子一枚棗子伴生薑四物成氣加朴硝此為玉燭散名標涼膈添歸同四物名為三和散同條三分散用小柴胡四物四非子同咀産後傷寒並痢者依方取效似神扶雙和散桂甘草芍黃耆參歸熟地黃薑棗煎來補氣血虛勞少力也堪嘗升陽益胃參朮耆黃連夏茯草陳皮澤瀉防風羌獨活柴胡白芍也堪題調中益氣桔升麻甘草柴胡蒼朮加黃耆木香參八味從前選用也堪誇炙甘草湯參阿膠麥門生薑大棗饒生地黃麻子仁桂入些酒煮治虛勞升陽補氣湯升麻澤瀉防風白芍誇厚朴柴胡羌獨活甘草地黃生用佳紺珠正氣天香湯天台烏藥與乾薑香附陳皮紫蘇葉婦入得此是奇方桂核桃仁生地黃芍藥甘草半夏良經脈不通繞臍痛煎加薑棗莫商量益胃散薑黃澤瀉乾薑砂仁益智仁白蔻黃耆參厚朴陳皮通用十分靈加減惺惺散術湯荊防芎芷細辛羌甘草當歸天花粉赤芍薄荷桔梗良益胃升陽當歸身參朮芩耆曲炒陳甘草升麻柴胡使秋間服者去黃芩上加芍藥治婦人經候不調或血脫後脈弱食少水泄一日二三行作痛訂補得效諸方歌九味羌活湯防風黃芩白芷與川芎乾葛生地細辛草煎法還加薑棗蔥大羌活湯即九味已獨知連術相助一十四般白水煎兩感風寒須此治小青龍湯治喘嗽薑桂麻黃細辛湊半夏五味芍藥甘心胸水氣自然透資壽解語附子風天麻酸棗桂羊充甘草羌活次第入竹瀝多湊亦收功大秦艽湯羌獨活芎芷甘辛兩地黃歸芍芩苓防白朮石膏十六味平良羌活愈風草參耆防風蔓細枳艽皮麻菊薄荷枸獨芷芎歸杜仲柴前知生熟地黃半朴桂芩苓芍術杞膏依萬寶回春湯甚奇甘麻芩杞杏仁依生地熟地芎歸芍黑附香附沉半皮茯神參朮防風桂烏藥川烏薑黃耆三五七散出茱萸姜附細辛防茯咀每取二錢溫酒下風寒入腦致陽虛山茱萸散甘菊花人參山藥茯苓遮川芎六味各五錢洽眩暈轉實堪誇羌活散麻藁升耆黃柏芩連與芎歸細蔓紅花蒼朮半尖頂項痛即時移升麻胃風葛芷蒼柴藁蔓歸草蔻羌甘柏麻黃薑棗煮能消面腫與牙眶加味羌活菊花散木賊芩芎荊芥草薄荷歸尾連防風芍藥蔓荊草決好川芎石膏散歸術芩梔大黃寒水石滑菊荊參草梗砂防風薄荷翹煎食還睛散用白蒺藜草決木賊與山梔防風蟬退青葙子為末門冬湯下之蟬花散亦還睛散加上荊芥草花膽蔓蜜芎菊各均平茶清調下昏醫展補陽八物除川芎澤瀉陳柴防桂同知母黃耆羌獨活空心煎服奏奇功犀角升麻湯白芷防風川芎白附子甘草羌活與黃芩用熱牙疼皆可使獨活散內用川芎羌活荊防薄荷同生地黃兼細辛使煎來漱咽牙齦風甘露兩地山茵陳天麥枇杷枳殼芩石甘等分煎之用男婦咽牙客熱靈通氣防風羌獨君寞本荊芎甘五分郁加升柴寒蒼柏太陽脊強痛堪均活絡湯用羌獨活芎歸白朮甘草雜姜煎一盞不拘時風濕臂痛便除脫舒經湯中薑黃用歸草桐術切碎共赤芍羌活又少些沉香磨服治諸痛五痹湯中白朮羌薑黃防己二錢足甘草一錢姜同煎筋緩皮頑堪再續三痹湯即寄生湯黃耆續斷合成方一切風痹拘攣疾煎服為丸任意嘗黃耆湯治渾身淋蔓草桔參芍藥邏臨臥水煎還滾服大熱三分黃柏加補氣湯黃耆白芍甘草澤瀉陳皮搏水煎能治皮膚麻兼醫眼目多昏錯正氣散名不換金蒼陳朴半藿甘真汗多去蒼加白朮份濕須加白茯苓神朮散用五兩蒼芎芷細辛藁本羌甘草六件各一兩風寒泄痢總相當人參清肺飲烏梅知母地骨桑皮培阿杏桔梗甘瞿粟加蜜澄清效若追二陳湯內有陳皮白茯苓兼甘草齊半夏還將白水泡久年痰嗽用皆宜洗肺散用天麥門半夏黃芩與杏仁甘草五味姜煎服咳嗽痰升效最靈貝母散中桑白皮款冬花與杏仁知五味甘草姜煎熟火嗽日久服無時款冬花散知母先桑葉麻黃阿膠黏杏仁貝母並半夏甘草㕮咀入姜煎木瓜湯用吳茱萸茴香甘草蘇鹽扶再研生蒜塗腳底不慮昏危人腹俞蟠蔥散用玄胡索桂姜蒼朮甘砂搏梭莪青丁白茯檳蔥煎熱服見歡樂十味香茹有四君木瓜扁豆朴相均加上黃耆連最妙和脾消暑有功勳清暑益氣草參耆麥冬五味青陳皮浮瀉升麻蒼白朮神麯葛柏與當歸人參養胃術苓甘陳半朴果藿梅堪能醫外感停痰食寒瘧尤當早服安芎歸鱉甲散茯苓芍藥半夏橘紅青熱加柴胡寒草果烏梅薑棗畏勞形導滯湯歸芩連桂大黃檳木甘草萃赤加甘草白加姜胃弱去黃加朮配地黃湯中白芍藥黃柏地偷白朮約腹痛還須枳朴佳滑石加上見安樂衛生湯即六君子加上山藥米仁子澤瀉黃連各等分虛痰火瀉方稱此一清飲子赤茯苓芎草桑皮柴胡並生薑棗子煎來服黃疸發熱效如神五皮散方亦甚奇大腹桑根固用皮茯苓姜桔俱等分能救渾身沒指危赤小豆湯用豬苓桑皮防已連翹仁澤汙當歸商陸芍熱甚再加犀角神平肝飲子用防歸枳梗川芎木桂枝楝參橘芍檳甘草腹脅妨暈嘔脹醫萆薢分清飲菖蒲茯苓甘草天台烏益智仁等鹽煎服通心氣止精濁余蒼朮復煎散紅花黃柏柴胡川升麻藁本澤汙羌白朮腦項背膝腰痛佳補腎湯即四君子加耆附陳羌木瓜甘草子蘇川芎少寒疝泄瀉用之佳白蔥散即四物湯枳朴莪梭茯桂姜參楝麴櫱青茴木蔥鹽煎治冷膀胱聚香飲子乳沉丁木檀藿香葉共成胡索薑黃烏梗桂甘草姜煎疝氣寧烏附通氣四苓散加歸芍橘香楂草不問疝氣久與新風寒暑溫氣皆掃檳蘇散內香蘇多甘陳檳瓜一半和薑蔥煎服治腳氣風濕疏通效莫過左經湯麻桂苓殼柴半甘加羌防朴姜芩小草杞麥冬對症加減旋斟酌大腹皮散宣木瓜蘇葉子同蘿蔔佳沉香烏藥檳榔桔枳殼桑皮荊芥花烏藥平氣茯神甘參朮芎歸木芷含五味蘇子皆等分姜煎腳氣悉皆堪當歸拈痛羌茵陳草芩升葛苦參人蒼白朮防豬澤瀉茯苓知母去查塵活燥潤血生津飲天麥門冬五味井瓜仁麻子草當歸地黃生熱天花引錢氏白朮散參苓甘草葛根五味寧藿香木香柴枳殼中消善谷十分靈滋陰降火古方稀四物湯中加柏知甘草陳皮並白朮天麥門冬遠志依人中白散生甘草青黛黃柏如金寶為末童便調二錢丹溪治火方真巧枳殼煮散防風芎乾葛細辛甘梗充姜煎一盞空心服脅疼氣痛盡能攻枇杷葉散香茹君麥門陳皮厚朴分丁瓜甘與茅根和暑毒攻心吐血欣歸脾湯歸龍眼肉酸棗遠志參耆朮茯神木香甘草姜憂思多度真宜服安胎飲內陳皮芩歸芍人參甘草平蘇葉砂仁生地人川芎白朮任煎吞達生散用蘇莖葉大腹甘草芩術切歸芍參陳黃楊腦蔥煎宜服在九月催生五積加烏附星香膠杏酒調助冬月破水後最宜不問生死胎俱墮牛膝湯治胎中死瞿麥滑石冬葵子赤小當歸與木通水煎一服見歡喜三分散用小柴胡四物四君子同咀産後傷寒並痢者依方取效似神扶三之一湯有柴胡半夏人參一處咀四物更加芩炒入諸般産後效通神
