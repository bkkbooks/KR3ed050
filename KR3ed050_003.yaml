body:
  text: 卷之三總論用藥入門要訣夫醫者意也醫不執方合宜而用至哉乎言也蓋天有五運地彰六氣人感風寒暑濕以有疾豈但紙上之陳言而能治哉請得而鋼論之夫肝主春於時自子至卯為陰中之陽風藥應之如防風羌活升麻葛根之類自地昇天味之薄者是也味辛補酸瀉氣溫補涼瀉心主夏於時自卯至午為陽中之陽熱藥應之如附子烏頭薑桂紅豆之類正秉火之正氣火之厚浮散下氣之厚者是也味鹹補甘瀉氣熱補寒瀉肺主秋於時自午至酉為陽中之陰燥藥應之如茯苓豬苓澤瀉木通之類自天收而降地氣之薄者是也味酸補辛瀉氣涼補溫瀉腎主冬於時自酉至子為陰中之陰寒藥應之如大黃芩連黃柏防己之類正秉水之氣味水之厚化浮沉味之厚者是也味苦補咸泄氣寒補熱瀉脾主長夏濕化味甘補苦泄氣寒熱溫涼各從其宜詳後分類注經曰補瀉在味隨時換氣凡言補補以辛溫甘熱之劑皆助春夏之升浮在人身乃肝心也凡言瀉以酸苦寒涼及淡滲之劑皆助秋冬之降沉在人身乃肺腎也從時春溫宜涼夏熱宜寒秋涼宜溫冬寒宜熱晝則從升夜則從降晴則從熱陰則從寒然病與時逆夏反用熱冬反用寒如發表不遠熱攻裡不遠寒以其不住於中也又如傷冷雖夏月可用辛熱傷酒及素有熱雖寒月可用苦寒然皆暫用也以人病言之病在上則宜升病在下則宜降病在外則宜浮病在內則宜沉病寒則治以熱病熱則治以寒變化至不一也故升降浮沉則順之所謂毋傷歲氣勿伐天和也寒熱溫涼則逆之所謂調其氣血使之融會也故曰醫者意也醫不執方合宜而用也豈可執一而論哉傷寒六經傳變歌傷寒一日二日間發熱頭疼及惡寒腰痛脈浮真可見此脈從頭連腰還無仟麻黃湯發散有汗傷風桂枝攢大青龍湯表裡實此屬太陽膀胱間傷寒二日三日內目痛身熱加一倍鼻乾不睡脈來長此脈往來緩者是無汗惡寒用葛根有汗桂枝湯一劑便實惡寒大柴胡此屬陽明胃經內三日四日病轉深耳聾胸脅痛如針寒熱嘔逆口乾苦此脈循脅絡耳真強盛之脈真可見小柴胡湯宜酌斟似瘧婦人血結類此屬少陽膽經尋病轉四日及五日腹痛咽乾自濕的自利而渴脈微沉脈布脾胃絡咽嗌四逆理中治臟寒腹滿脈浮桂枝入胸滿痰多瓜吐之此屬太陽脾經脈傷寒五日六日挨多眠口燥舌乾哉此脈絡肺系舌本指下脈沉貫腎來舌乾須用小承氣不渴不幹四逆差汗出傷陽諸膚屬此屬少陰腎經排仿寒六日七日到囊縮脈微煩滿貌筋急唇青四體疼脈尋陰氣絡肝道脈若不浮小建中浮緩如瘧各半妙囊縮汗毒承氣加此屬厥陰肝經奧六經正病歌太陽頭疼身熱脊強陽明目痛鼻乾不眠少陽耳聾脅痛寒熱嘔而口為之苦大陰腹滿自利尺寸沉而津不到咽少陰則舌乾口燥厥陰則煩滿囊拳一日二日可發表而散三日四日宜和解而痊五六日便實方可議下七八日不愈又復再傳日傳二經名為兩感經傳六日應無一痊太陽無汗麻黃為最太陽有汗桂枝可先小柴胡為少陽之要領大柴胡行陽明之秘堅至三陰則難拘定法或可溫而或可下宜數變以曲全生意或可方而或可圓傷寒表裡二症用藥歌傷寒表症是如何無汗惡寒身熱多頭項俱疼脈浮取擇方施劑汗之和用十神湯主之傷寒里症腹心膨不惡寒來惡熱蒸其脈數沉兼自汗汗便秘結下之生用大柴胡湯主之陽症陰症陽症身熱頭疼痛體痛咽乾難自動或有譫語及循衣脈息弦洪宜審用陰症身涼二便清病初自汗少頭疼也無煩躁也無渴脈息沉微自可明陽症似陰陰症似陽陽症身涼冷四肢小便赤少大便稀心煩口燥脈沉數白虎湯兼竹葉奇陰症如陽面色紅小便清滑大便通渾身微熱沉遲脈真武湯兼用理中陽厥陰厥陽厥時時指爪溫心煩便秘口乾論脈來沉細中還疾承氣柴胡一盞吞陰厥身涼熱不回二便通話不煩時脈來沉細知端的三建湯兼四物宜血脈黃歌面黃恰似煙燻色小便自利大便黑唇焦漱水血家黃桃仁承氣湯堪擇濕症黃歌發黃渾似橘皮明小便不利大便行濕熱相蒸名曰疸茵陳湯共五苓平柔痓剛痓歌元來柔痓屬膀胱口禁如疸身反張此是傷風感寒濕故分兩症有柔剛無汗為剛須易識惟有葛根湯第一有汗為柔端的詳桂枝葛根湯救急二痓皆宜續命湯剛痓去桂用麻黃柔痓去麻當用桂只因此法最為良傷寒四症相類歌食積寒痰並腳氣更兼亦有患勞煩要識四般相類症不與傷寒一例看傷寒至捷法歌計一十九首發熱憎寒體痛時脈浮無汗怎生醫十神五積香蘇散有汗傷風用桂枝汗後依前病不除三朝四日莫躊躇或用參蘇或敗毒加些良劑病當舒病傳入里腹脹滿口乾熱盛小柴管病若仍前熱泄多只用柴苓湯小碗六日七日病轉熱前後不通好飲啜或有亂語及循衣大柴承氣可通別下後仍前病不休黃連解毒免人憂病後虛煩熱已靜白虎竹葉石膏投陽厥還須用大柴不然承氣也通挨陰蕨四逆並真武三建加之自忖裁胸膈停痰氣悶時可將瓜蒂吐之宜怔忡水停微有喘青龍十棗便能醫陽毒發班是如何梔子大黃黑奴科咽喉腫痛還曾治甘枯湯惟而味和膈痰冷氣如何治理中丸子君須記去血還須抵當湯嚏氣不絕旋覆輩小便不通五苓宜豬苓八正皆曰奇大便不通蜜導法硝黃服後熨其臍熱吐五苓半夏加冷吐四逆茱萸佳狐惑嘎聲人不曉大黃牡蠣眾皆誇發黃梔子柏皮同退疸茵陳極有功治蜜桃仁犀角類大黃甘遂解結胸昏沉多睡萎蕤湯煩躁無眠酸棗方少陰自利白通美腳氣續命越脾當柔痓桂枝加乾葛剛痓麻黃葛根活陰症似陽四逆宜陽症如陰白虎奪食復勞份卻怎醫枳實梔子內中追陰易陽易如何治燒裩鼠糞此湯宜吐蛔烏梅與理中用濕黃芩朮附通腹中急痛如何治桂枝加入大黃中吐血解毒與三黃筋惕肉瞤真武湯肺實嗽喘青龍美衄血不止茅花強往來寒熱瘟瘧侵小柴胡湯還可臨咳逆皆因胃寒致乳下艾灸羌附星熱深咳逆成陽逆大小柴胡自去攀此是醫家入門訣更宜明者用心參對症諸湯散小承氣湯治傷寒潮熱讝語如有所見大便六七日不通是有燥糞結滯服此枳實一個炒去穰大黃一兩厚朴去皮薑製一兩上讝咀每服五錢水盞半煎八分以利為度瓜蒂散治傷寒四五日病在胸膈痰氣緊滿於上宜此吐之瓜蒂一兩炒黃赤小豆一兩上讝咀每服三錢水盞半入淡豆豉一合同煎至八分去滓溫服以吐得快為度亡血體虛者不可服之小青龍湯治傷寒表症不解心下有水氣乾嘔發熱咳嗽微喘又治肺經受寒咳嗽喘急半夏湯洗二兩半乾薑細辛五味子麻黃肉桂芍藥甘草上㕮咀每服五錢水盞半煎至八分食前溫服大青龍湯治傷寒頭疼發熱惡寒無汗煩躁六脈浮緊麻黃桂枝甘草杏仁石膏大棗五枚生薑十片上用水盞半煎八分溫服取汗為度若汗多不止用濕粉撲之甘桔湯治少陰咽痛桔梗甘草各不拘多少上用水盞半煎八分通口服酸棗湯治傷寒吐下後心煩逆氣晝夜不眠酸棗仁甘草知母茯苓川芎麥門冬乾薑上用水一盞煎至七分溫服十神湯治時令不正瘟疫妄行感冒及熱或欲出疹痘此藥不問陰陽兩感傷寒並宜服之紫蘇甘草陳皮香附乾葛升麻芍藥川芎白芷麻黃上㕮阻每服三錢水盞半姜五片煎至七分去滓熱服不拘時候如發熱頭疼加蓮鬚蔥白中滿氣實加枳殼名和解散香蘇散治四時傷寒頭疼發熱惡寒宜服此紫蘇陳皮香附甘草上㕮咀用水盞半加生薑三片蔥白五個煎至七分安心熱服如頭疼加川芎白芷名芎芷和解散人參敗毒散治傷寒頭疼壯熱惡寒及風痰咳嗽鼻塞聲重心煩蘊熱人參桔梗甘草川芎茯苓枳殼前胡羌活獨活柴胡上㕮咀用水盞半生薑三片薄荷少許同煎七分去滓服不拘時候咳嗽加半夏發熱加黃芩黃蘖梔子黃連赤利咳血口舌乾燥加黃芩風熱加荊芥防風名荊防敗毒散又與消風散相合名消風敗毒散小柴胡湯治傷寒如瘧胸膈滿痛小便不利大便秘澀柴胡半夏人參黃芩甘草上㕮咀用水盞半生薑五片棗子一枚煎至七分熱服胸滿及咽痛加枳實桔梗即名柴胡枳桔湯脅痛加芍藥石菖蒲名柴胡芍藥湯脅腹臍痛加枳殼大黃名柴胡飲子無汗加升麻葛根名柴胡葛根湯又名柴胡升麻湯咳嗽加杏仁五味子名參胡五味湯汗下之後病尚不解加黃連黃柏黃芩梔子名黃胡解毒湯結胸加瓜蔞子發黃加茵陳黃柏發黃有血症加桃仁當歸狂亂加大黃朴硝衄血下血加黃連犀角大柴胡湯治傷寒十餘日不解邪氣結在裡身熱煩躁語言譫妄大便不通繞臍刺痛柴胡大黃枳殼半夏赤芍藥黃芩上㕮咀用水盞半生薑五片棗子一枚煎至七分去滓溫服此藥治傷寒內熱裡實若身體疼痛是表症未解不可服之熱極腹脹及結胸加朴硝發黃小便自利大便黑加桃仁當歸桂枝發黃小便不利加茵陳梔子黃柏五苓散治傷寒後發渴小便不利豬苓澤瀉茯苓肉桂白朮上㕮咀白水煎服黃連解毒湯治傷寒染病燥熱毒煩悶乾嘔口燥呻吟喘滿陽厥及深蓄熱內甚俗多妄為陰毒者及汗下吐後寒涼諸藥不能退熱勢而感症同法黃連黃柏黃芩梔子上㕮咀水二盞煎至一盞熱服如腹滿嘔吐或欲作痢者每服加生半夏二枚厚朴二錢生薑三片名半夏黃連解毒湯又名黃連清心湯麻黃湯治傷寒頭痛發熱惡寒骨節疼痛喘滿無汗麻黃杏仁桂枝甘草上用水一盞煎至八分溫服桂枝湯治傷寒太陰經受病頭疼身痛或翕翕發熱或洒洒惡風桂枝芍藥甘草上用水一盞姜三片棗二枚煎至七分溫服不拘時候惟春初可依此方春分以後夏至以前加黃芩五兩夏至後加石膏二兩知母五錢升麻五錢若病人素虛寒者不用加減無汗休服白虎湯治傷寒大汗後表症已解或吐下後邪氣未除熱結在裡心胸煩渴甚欲飲水石膏甘草知母上用水盞半入粳米三十餘粒煎至七分去滓溫服煩渴不已者加人參發斑加梔子大黃名化斑湯竹葉石膏湯治傷寒已經汗下表裡俱虛津液枯竭心煩發熱氣逆欲吐及諸虛煩熱並宜服之人參半夏甘草石膏麥門冬上入青竹葉生薑各五六片水二盞煎一盞去滓入粳米百餘粒再煎至米熟去米溫服不拘時候真武湯治傷寒數日已後發熱腹痛頭目昏沉大便自利小便或利或澀或嘔或咳或已經汗不解仍復發熱心下動悸頭目眩暈皆由渴後飲水停留中脘所致此湯並能治之芍藥茯苓白朮甘草附子炮上用水盞半煎至八分溫服不拘時候咳嗽加五味子七錢五分細辛乾薑各二錢五分下利去芍藥加乾薑五錢小便利去茯苓嘔者去附子加生薑調中湯治秋夏之間暴寒折於盛熱熱結於四肢則壯熱頭疼寒傷於胃則下痢或血或水如脈數者宜此下之大黃葛根藁本黃芩白朮芍藥桔梗茯苓甘草上用水盞半煎至八分溫服不拘時候三建湯治厥陰天雄川烏附子上用水盞半生薑十大片煎服四逆湯治傷寒自利脈微欲絕手足厥冷乾薑甘草附子去皮尖上用水一盞煎至七分溫服不拘時候桃仁承氣湯治太陽病不解熱結膀胱如狂如顛血自下但小腹結者大黃去皮厚朴去皮薑製桃仁芒硝上用水二盞煎至一盛去滓入芒硝再煎一二沸通口服茵陳蒿湯治陽明裡熱極甚煩渴熱鬱留飲不散以致濕熱相搏身黃髮疸但頭出汗身無汗小便不利渴飲水漿身心發黃宜本方合五苓散利大小便茵陳大黃山梔子上用水二盞半漫火煎至一盞絞汁溫服以利為度甚者再服當下膿血如腐爛魚腸膠鰾等物及小便焦黃此一劑分作四服調五苓散三錢名茵陳五苓散升麻湯治大人小兒時氣瘟疫頭疼發熱及瘡疹已發未發疑似之間並宜服之升麻葛根芍藥甘草上用水一盞煎至七分熱服小續命湯治語言蹇澀及一切風痓麻黃人參黃芩芍藥防己甘草川芎肉桂各一兩防風去蘆五兩附子炮去皮尖五錢杏仁去皮夾灰炒一兩上用水一盞生薑三片煎至七分通口服溫膽湯治傷寒瘥後氣脈不和食復勞復病症如初半夏枳實橘紅茯苓甘草上㕮咀每用四錢水一盞半姜七片棗一枚竹茹一團煎至七分去滓食前熱服防風通聖散治男婦傷寒外症惟有孕三四月或七八月不用硝余月分用之無妨小兒減劑服之此中有古人治傷寒不傳之妙後學宜慎寶之防風川芎當歸芍藥薄荷連翹黃芩桔梗石膏山梔白木滑石荊芥甘草大黃芒硝麻黃上大黃芒硝麻黃三味對症施入自利去大黃朴硝自汗去麻黃益元散即天水散又名六一散治中暑消渴瀉痢等症滑石六錢甘草一錢上共為末每服二錢水調服不拘時甚能救急傷寒外症加減方次第第一雙解散防風通聖散合益元散一名通解散第二大柴胡涼膈天水合服第三涼膈小柴胡臺服第四大柴胡合黃連解毒湯第五大柴胡合三一承氣湯第六承氣合解毒湯第七瓜蒂散第八涼膈散風第九益元散第十雙解散第十一白虎散第十二承氣解毒湯暑第十三白虎湯第十四五苓合天水散第十五承氣合散毒湯第十六白虎湯加蒼朮第十七涼膈散合解毒湯第十八解毒合承氣湯第十九解毒涼膈天水散合服結胸第二十大小陷胸湯第二十一小柴胡合小陷胸湯第二十二大承氣湯第二十三解毒湯發斑第二十四涼膈散加當歸發黃第二十五茵陳湯調五苓散第二十六茵陳合承氣湯煩心不眠第二十七梔子豆豉湯第二十八五苓散空服煎涼膈加枳殼桔梗剛柔二痓第二十九承氣合解毒湯汗後煩渴第三十涼膈減桂五苓甘露益元湯甘露飲亦桂苓白朮散上共二十八方如無大承氣第五三一承氣代之亦妙通三十九件藥味調理傷寒曲盡其妙百發百中後之學者詳辨脈症審而用之起沉疴於反掌回造化以活人方知其妙也傷寒五臟受病歌心病舌強笑面赤躁煩掌熱口乾讝臍上動氣洪緊數反得沉微命不全肝家面青目痛閉筋急怒容臍左氣脈當弦急又兼長浮稜短兮名不治脾家不食麵皮黃體重肢疼喜臥床動氣當臍脈緩大弦長而緊是凶殃肺家面白帶憂愁吐衄寒溫喘嗽求臍右氣兮沉細稜大而牢者死根由腎家面黑爪甲青耳閉足寒泄腹疼臍下氣兮脈沉滑緩而大者死之形風諸中風對症用藥歐中風之症多般類偏枯風痱並風懿風痹四者本同宗中人心肝脾腎肺半身不遂肉頑麻不知人事昏沉睡手足抽制痰涎壅榮衛因虛所由致治發順氣與疏風烏藥順氣當先試小續命兼排風湯甚者三生飲為最烏藥順氣散疏風順氣治一切風氣四肢頑麻骨節疼痛烏藥陳皮乾薑枳殼姜蠶川芎白芷甘草麻黃桔梗上用水一盞姜三片棗一枚煎至七分憎寒壯熱頭疼肢休倦怠加蔥白三寸同煎並服出汗或閃挫身體不能屈伸溫酒調服遍身搔癢抓之成瘡用荷葉煎服常服疏風順氣小續命湯治中風半身不遂口眼喎斜手足顫掉語言蹇澀及一切風痓之症麻黃人參黃芩芍藥防己甘草川芎肉桂各兩防風去蘆五兩附子炮去皮尖五錢杏仁去皮尖灰炒一兩上用水一盞生薑三片煎至七分通口服排風湯治中風五臟諸風狂言亦治風毒腳氣腫痛白朮當歸辣桂川芎杏仁防風獨活麻黃甘草白芍白鮮皮白茯苓上用水一盞半姜五片溫服不拘時候三生飲治卒中風昏迷痰涎壅並口眼歪斜脈沉無熱者可服之南星生一兩川烏生去皮附子半兩生去皮南木香錢半上用水一盞生薑七片煎服不拘時候人參順氣散治感風頭痛鼻塞聲重一切中風宜服此能疏風順氣人參乾薑各一兩川芎甘草炙四兩桔梗厚朴制白朮陳皮白芷麻黃各四兩乾葛三錢半上㕮咀每服三錢水一盞姜三片棗一枚薄荷五七葉煎熱服不拘時候或加姜蠶一兩乾薑五錢去白木人參又簡易加烏藥枳殼去厚朴乾薑用之專遍滯氣如感風頭痛咳嗽鼻塞加蔥白煎順風勻氣散治氣寬中中風頭疼止瀉去濕人參天麻木瓜白朮白芷烏藥沉香紫蘇甘草青皮上㕮咀薑棗煎服洗藥荊芥散煎湯洗諸風癬荊芥苦參白芷獨活羌活黃柏防風外應散去風治五痹濕痛發熱散風羌活獨活藁本荊芥苦參防風白芷紫蘇藿香大蓼杉木川椒荊村皮石楠皮樟葉各不拘多少加薑蔥煎八仙散白水煎洗諸風白芷防風荊芥羌活川芎苦參威靈仙何首烏御藥院方煎湯洗諸風症椿槐榆柳桑條寒諸中寒對症用藥歌中寒之病腎為根腎氣空虛寒易侵氣弱體虛調護失乘涼臥地也傷人四肢厥冷俱僵直腹痛昏迷口失音治法只宜溫散藥無過五積理中尋理中湯治五臟中寒口噤失音四肢僵直腹冷疼瀉兼治胃脘寒冷氣刺作痛人參白朮乾薑上用水盞半煎七分熱服加附子即名附子理中湯生料五積散治中寒及感冒寒邪頭疼身痛腹背拘急惡寒嘔吐腹痛不問外感風寒內傷生冷寒濕客於經絡腰腳痠疼及通婦人經水白芷陳皮厚朴甘草枯梗枳殼川芎芍藥茯苓蒼朮當歸半夏肉桂乾薑麻黃上用水盞半姜三片蔥白三根煎至七分熱服胃寒用煨姜挾氣加茱萸調經催產入艾醋寒濕腳氣加木瓜檳榔青藤穿山甲暑治中暑對症用藥歌傷暑做出百般病入心胞絡與胃應胃氣稍虛胃暑行暑入口牙心則病口渴心煩背悶沉或為吐瀉熱不定四肢厥冷脈微虛身體但無疼痛並驅暑和中二事先香茹五苓堪立應常服六和湯最宜外熱內寒理中正香薷飲治伏天中暑病熱飲水口燥咽乾香薷一兩厚朴白扁豆各三錢上用水一盞入酒少許煎候冷服加黃連名黃達香薷散五苓散治中暑煩渴身熱頭疼霍亂吐瀉小便赤少豬苓澤瀉茯苓肉桂白朮上㕮咀白水煎服合香薷飲名薷苓湯心神恍惚加神砂名神砂五苓散發熱加竹葉麥門冬理中湯治夏月伏陰暑家病者氣脈俱虛飲水過度或服涼劑傷動其中嘔吐不食自利不渴此則外熱內寒感乎傷暑伏熱之熱當用此藥人參白朮乾薑上用水盞半煎七分溫服六和湯治傷暑霍亂吐瀉兩腳轉筋四肢厥冷半夏砂仁杏仁人參甘草扁豆木瓜藿香香薷厚朴赤茯苓上用水二盞姜三片棗一枚溫服不拘時候若熱渴瀉加黃連濕治中濕對症用藥歌問君何以知中濕染於杳冥不自識非專雨水是濕根天氣地氣汗氣窒中人身體覺沉重骨肉痠麻行不疾漸加浮腫及身黃治法利便除身濕五苓除濕滲濕先加減消詳用五積又有風濕腰腿疼獨活寄生湯可食五苓散利水除濕止嘔逆治浮腫加平胃散治濕之常藥也豬苓澤瀉茯苓肉桂白朮上㕮咀白水煎服乎胃散治濕常用蒼朮陳皮厚朴甘草上用水一盞半姜三片棗二枚煎至七分食前服除濕湯治濕通用蒼朮白朮甘草茯苓乾薑橘紅丁香上用水一盞半姜五片棗一枚煎至八分不拘時服五積散治寒濕客於經絡腰腳痠疼渾身麻木兼治損痛白芷陳皮厚朴甘草桔梗枳殼川芎芍藥茯苓蒼朮當歸半夏肉桂乾薑麻黃上水盞半姜三片蔥白三個煎七分熱服獨活寄生湯治風濕腰腿痠疼退寒熱虛弱獨活當歸芍藥防風牛膝細辛茯苓秦艽人參桂心川芎杜仲甘草桑寄生熟地黃各等分上用白水二盞煎八分熱服
