body:
  text: 卷之一醫學入門本草引序夫醫者意也藥不執方合宜而用投機應病則酌杯可以起沉疴造妙通玄雖刀圭足以延壽者非惟愈疾亦可頤生斯術之傳其來尚矣自神農嘗百草以濟蒼生逮黃帝辨四方而興素問歷代之聖君哲輔靡不留心自古之孝子仁人咸知注意玉函金匱無非濟世之良方紅杏青囊莫匪活人之祕典蓋以人生兩間身緣四大感風寒暑濕之侵蒸或喜怒優思之鬱結苦樂榮悴悉損精神飢炮逸勞俱傷氣血真元才觸景以中虧邪氣即乘虛而外感有生難免具體皆然仲尼豈不能避疾保身康子尤未免問安饋藥且藥性有寒溫良毒人稟有虛實盛衰未達其由豈可遽嘗必有恆心斯能永濟望聞問切須詳審於臨診之時補泄宣通尤謹嚴於投劑之際先後緩急有其序澀滑燥濕得其宜則到口觸疴應手輒效假如心胸飽滿服蘿蔔而寬舒肚腹脹膨飲牽牛而快利麻黃髮散入腸胃則汗流瓜蒂宣通下咽喉而涎湧藥無不效用當極靈試嚼烏梅遽齒酸而津溢才吹皂角立鼻嚏以氣通咬荊芥則汨垂齧花椒而氣閉龜尿解噤鼠骨生牙磁石引針琥珀拾芥鸞膠續劍獺膽分杯血投藕而不凝漆得蟹而自散蔥汁可以熬桂作水蟾膏乃能軟玉如泥凡物性各有不同在智者隨宜取用略舉數端證驗以明一切殊功誠能識性知機用若通神入聖是以扁鵲華他各展驚人之技稚川思邈咸垂救世之慈每用單行或時兼使以為一物專攻則氣純而急速數般相制乃味雜而效遲唯相須佐使者配合則併力以收功若相反畏忌者交參必爭仇而播毒當療轉劇貽患匪吵與其不能研精灼見孰若但從簡要易知抑且省其冗繁況復便於倉卒然藥之真贋休戚所關方之否臧安危是系必合精詳有據豈宜滅裂無宗須裒衆善之長庶獲萬全之效取其易捷不特便於旅途拔其精華實有利於人己援諸例以分門比諸類而列款舉冊可以對症求方療疾更宜隨時用藥雖同一症詳其新久重輕必按諸方慎擇剛柔緊慢如纏膚腠但用輕清若固膏育必施瞑眩況風土有炎涼之異氣稟有厚薄之殊貴人富室治亦異乎貧窮處子尼孀療難同於妻妾要在知之審而見之明尤必制之精而用之當炮熬煮炙雷公論之甚祥表裡陰陽岐伯言之至備蓋以四海之廣兆民之衆扎瘥時行非醫莫療今豫擇諸方類為一帙以便仁人之檢用益施藥不如施方意也是大序
